name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards (SSH signed)
        env:
          SSH_SIGNING_KEY: ${{ secrets.SSH_SIGNING_KEY }}
        run: |
          # Write signing key to temp file
          mkdir -p ~/.ssh
          echo "$SSH_SIGNING_KEY" > ~/.ssh/id_ed25519_signing
          chmod 600 ~/.ssh/id_ed25519_signing

          # Derive public key and build allowed_signers
          ssh-keygen -y -f ~/.ssh/id_ed25519_signing > ~/.ssh/id_ed25519_signing.pub
          echo "78338192+PostboxRetinal@users.noreply.github.com $(cat ~/.ssh/id_ed25519_signing.pub)" \
            > ~/.ssh/allowed_signers

          # Git identity
          git config user.name "PostboxRetinal"
          git config user.email "78338192+PostboxRetinal@users.noreply.github.com"

          # SSH signing config
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/id_ed25519_signing
          git config gpg.ssh.allowedSignersFile ~/.ssh/allowed_signers
          git config commit.gpgsign true

          git add profile/*.svg
          git commit -m "chore(stats). update README stats cards [skip ci]" || exit 0
          git push

          # Clean up — never leave the private key on the runner
          rm -f ~/.ssh/id_ed25519_signing ~/.ssh/id_ed25519_signing.pub